name: Web Quality

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  install:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: personalhub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: personalhub/package-lock.json

      - name: Install dependencies
        run: npm ci

  check-types:
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: personalhub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: personalhub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run check-types -w web

  lint:
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: personalhub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: personalhub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w web

  smoke:
    runs-on: ubuntu-latest
    needs: [check-types, lint]
    defaults:
      run:
        working-directory: personalhub
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: personalhub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify required env secrets
        run: |
          for key in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Sprint 02 smoke checks
        run: node scripts/smoke/sprint02-smoke.mjs

  e2e-auth:
    runs-on: ubuntu-latest
    needs: [check-types, lint]
    defaults:
      run:
        working-directory: personalhub
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_BASE_URL: http://127.0.0.1:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: personalhub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
        working-directory: personalhub/apps/web

      - name: Verify required env secrets
        run: |
          for key in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY E2E_USER_EMAIL E2E_USER_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Run auth e2e
        run: npm run e2e -w web -- e2e/auth.spec.ts
